<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxu | Personal Site</title>
    <meta
      name="description"
      content="Luxu 的个人主页与博客，记录随笔和持续学习。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="#top" aria-label="首页">
          <span class="brand-mark" id="brand-mark">LX</span>
          <span class="brand-text" id="brand-text">Luxu Notes</span>
        </a>
        <nav class="site-nav" aria-label="主导航">
          <a href="#writing">博客</a>
          <a href="#about">关于</a>
          <a href="#contact">联系</a>
          <button
            class="theme-toggle"
            id="theme-toggle"
            type="button"
            aria-label="切换深浅色"
          >
            ☾
          </button>
        </nav>
      </header>

      <main id="top">
        <section class="hero reveal">
          <div class="hero-copy">
            <p class="eyebrow" id="hero-eyebrow">Personal Homepage / Blog</p>
            <h1 id="hero-heading">把思考和成长轨迹放在同一个地方。</h1>
            <p class="hero-text" id="hero-text">
              这是 Luxu 的个人站点。记录随笔与持续学习。
            </p>
            <div class="hero-actions">
              <a class="button button-primary" id="hero-primary" href="#writing"
                >开始阅读</a
              >
              <a
                class="button button-secondary"
                id="hero-secondary"
                href="#contact"
                >联系我</a
              >
            </div>
          </div>
          <aside class="hero-panel reveal delay-1">
            <p class="panel-label">Now</p>
            <ul class="status-list" id="now-list"></ul>
          </aside>
        </section>

        <section class="section reveal" id="about">
          <div class="section-heading">
            <p class="eyebrow">About</p>
            <h2>关于</h2>
          </div>
          <div class="about-card card">
            <div class="about-photo empty" id="about-photo">照片位</div>
            <div class="about-bio" id="about-bio"></div>
          </div>
        </section>

        <section class="section reveal" id="writing">
          <div class="section-heading split-heading">
            <div>
              <p class="eyebrow">Writing</p>
              <h2>博客</h2>
            </div>
            <div class="tag-filter" id="tag-filter" aria-label="文章标签过滤"></div>
          </div>

          <div class="writing-toolbar">
            <input
              id="search-input"
              class="search-input"
              type="search"
              placeholder="搜索文章（标题 / 摘要 / 标签 / 正文）…"
              aria-label="搜索文章"
            />
          </div>

          <div class="featured-post card" id="featured-post"></div>
          <div class="post-grid" id="post-list"></div>
        </section>

        <section class="section post-detail hidden" id="post-detail-section">
          <a class="back-link" href="#writing">← 返回文章列表</a>
          <article class="post-article card" id="post-detail"></article>
          <section class="comments" id="comments" aria-label="评论"></section>
        </section>

        <section class="section reveal" id="contact">
          <div class="section-heading">
            <p class="eyebrow">Contact</p>
            <h2>联系</h2>
          </div>
          <div class="contact-card card">
            <p id="contact-intro"></p>
            <div class="contact-links" id="contact-links"></div>
          </div>
        </section>

        <section class="metrics reveal" aria-label="站点概览">
          <article>
            <span class="metric-value" id="post-count">0</span>
            <span class="metric-label">文章</span>
          </article>
          <article>
            <span class="metric-value" id="stat-pv">…</span>
            <span class="metric-label">总访问量</span>
          </article>
          <article>
            <span class="metric-value" id="stat-uv">…</span>
            <span class="metric-label">访客数</span>
          </article>
        </section>
      </main>

      <footer class="site-footer">
        <p>© <span id="current-year"></span> <span id="footer-text">Luxu Notes</span></p>
        <p>Built for <code>luxuuuuuuuu.github.io</code>.</p>
      </footer>
    </div>

    <button class="back-to-top" id="back-to-top" type="button" aria-label="回到顶部">
      ↑
    </button>

    <script src="./config.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
