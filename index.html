<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxu | Personal Site</title>
    <meta
      name="description"
      content="Luxu 的个人主页与博客，记录随笔和持续学习。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="site-rail">
        <div class="rail-title">Lucks'Space</div>
        <nav class="site-nav" aria-label="主导航">
          <a class="nav-link" data-view="blog" href="#blog">Blog</a>
          <a class="nav-link" data-view="home" href="#home">Category</a>
          <a class="nav-link" data-view="about" href="#about">About</a>
        </nav>
        <div class="rail-actions">
          <button
            class="theme-toggle"
            id="theme-toggle"
            type="button"
            aria-label="切换深浅色"
          >
            ☾
          </button>
        </div>
      </aside>

      <div class="content-shell">
        <main id="top">
          <section class="view" id="view-home" data-view="home">
            <div class="view-header">
              <p class="eyebrow">Home</p>
              
              <p class="view-intro">
                
              </p>
            </div>
            <div class="category-list" id="category-list"></div>
          </section>

          <section class="view" id="view-about" data-view="about">
            <div class="view-header">
              <p class="eyebrow">About</p>
              <h1></h1>
              <p class="view-intro">
                
              </p>
            </div>

            <div class="about-layout">
              <div class="about-card">
                <div class="about-copy">
                  <div class="about-bio">
                    <div class="about-photo empty" id="about-photo">照片位</div>
                    <div class="about-bio-text" id="about-bio"></div>
                  </div>
                </div>
              </div>

              <div class="about-side">
                <div class="stat-cards" aria-label="站点概览">
                  <article class="stat-card">
                    <span class="stat-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12z"/><circle cx="12" cy="12" r="3.2"/></svg>
                    </span>
                    <span class="stat-value" id="stat-pv">…</span>
                    <span class="stat-label">访问量</span>
                  </article>
                  <article class="stat-card">
                    <span class="stat-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7.5" r="3.7"/><path d="M4.5 20.5a7.5 7.5 0 0 1 15 0"/></svg>
                    </span>
                    <span class="stat-value" id="stat-uv">…</span>
                    <span class="stat-label">访客量</span>
                  </article>
                  <article class="stat-card">
                    <span class="stat-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5h8l4 4v13H6z"/><path d="M14 3.5v4h4"/><path d="M9 12h6M9 15.5h6"/></svg>
                    </span>
                    <span class="stat-value" id="post-count">0</span>
                    <span class="stat-label">文章</span>
                  </article>
                </div>

                <div class="contact-block">
                  <p class="eyebrow">Contact</p>
                  <p id="contact-intro"></p>
                  <div class="contact-links" id="contact-links"></div>
                </div>
              </div>
            </div>
          </section>

          <section class="view" id="view-blog" data-view="blog">
            <div class="view-header compact">
              <div>
                <p class="eyebrow">Blog</p>
                
              </div>
              <div class="tag-filter" id="tag-filter" aria-label="文章标签过滤"></div>
            </div>

            <div class="writing-toolbar">
              <input
                id="search-input"
                class="search-input"
                type="search"
                placeholder="搜索文章标题、摘要、标签或正文..."
                aria-label="搜索文章"
              />
            </div>

            <div class="featured-post" id="featured-post"></div>
            <div class="post-grid" id="post-list"></div>
          </section>
          <section class="view post-detail" id="post-detail-section">
            <a class="back-link" href="#blog">← 返回文章列表</a>
            <article class="post-article" id="post-detail"></article>
            <section class="comments" id="comments" aria-label="评论"></section>
          </section>
        </main>

        <footer class="site-footer">
          <p>© <span id="current-year"></span> <span id="footer-text">Luxu Notes</span></p>
          <p>Built for <code>luxuuuuuuuu.github.io</code>.</p>
        </footer>
      </div>
    </div>

    <button class="back-to-top" id="back-to-top" type="button" aria-label="回到顶部">
      ↑
    </button>

    <script src="./config.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
